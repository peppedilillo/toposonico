server {
    listen 8080;
    server_name _;

    location ~* ^/tiles/.*\.pbf$ {
        root /usr/share/nginx/html;
        default_type application/x-protobuf;
        add_header Access-Control-Allow-Origin "*" always;
        add_header Content-Encoding gzip;
        try_files $uri =404;
    }

    location ~* ^/tiles/.*\.json$ {
        root /usr/share/nginx/html;
        default_type application/json;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    location /tiles/ {
        root /usr/share/nginx/html;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }
}
